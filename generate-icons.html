<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate PWA Icons</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 2rem; gap: 1rem; }
        canvas { border: 1px solid #333; }
        button { padding: 0.75rem 2rem; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #4f46e5; }
        .icons { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    </style>
</head>
<body>
    <h1>PWA Icon Generator</h1>
    <p>Click the button to download all required icons</p>
    <div class="icons" id="iconsContainer"></div>
    <button onclick="generateAll()">Generate & Download All</button>

    <script>
        const sizes = [16, 32, 72, 96, 128, 144, 152, 167, 180, 192, 384, 512];

        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(1, '#ec4899');

            // Rounded rectangle background
            const r = size * 0.18;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(size - r, 0);
            ctx.quadraticCurveTo(size, 0, size, r);
            ctx.lineTo(size, size - r);
            ctx.quadraticCurveTo(size, size, size - r, size);
            ctx.lineTo(r, size);
            ctx.quadraticCurveTo(0, size, 0, size - r);
            ctx.lineTo(0, r);
            ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // Draw "F" letter
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.55}px Inter, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('F', size / 2, size / 2 + size * 0.02);

            return canvas;
        }

        function generateAll() {
            sizes.forEach(size => {
                const canvas = generateIcon(size);
                const link = document.createElement('a');
                link.download = `icon-${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Show preview
        sizes.forEach(size => {
            if (size >= 72) {
                const canvas = generateIcon(size);
                canvas.style.width = Math.min(size, 128) + 'px';
                canvas.style.height = Math.min(size, 128) + 'px';
                document.getElementById('iconsContainer').appendChild(canvas);
            }
        });
    </script>
</body>
</html>
